<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LipMatch - 理想の色を見つけよう</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Shippori+Mincho:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      /* スクリーンショットの非常に淡いクリーム色 */
      background-color: #F3EAE4;
      background-image: radial-gradient(ellipse at 30% 20%, #FDF5F0 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 80%, #EDE0D8 0%, transparent 50%);
      color: #4A2C1A;
      font-family: 'Shippori Mincho', serif;
      min-height: 100vh;
      padding-bottom: 60px;
    }

    /* ── HEADER ── */
    .lm-header {
      text-align: center;
      padding: 56px 24px 40px;
    }
    .lm-eyebrow {
      font-size: 10px;
      letter-spacing: 0.4em;
      color: #B8917A;
      text-transform: uppercase;
      margin-bottom: 12px;
      font-weight: 300;
    }
    .lm-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 62px;
      font-weight: 600;
      line-height: 1;
      color: #3B2010;
      letter-spacing: -0.01em;
    }
    .lm-logo em {
      font-style: italic;
      color: #B8744A;
      font-weight: 400;
    }
    .lm-subtitle {
      margin-top: 16px;
      font-size: 13px;
      color: #B8917A;
      letter-spacing: 0.22em;
      font-weight: 300;
    }
    .lm-divider {
      width: 36px;
      height: 1px;
      background: #C4A088;
      margin: 22px auto 0;
    }

    /* ── MAIN CONTAINER ── */
    .lm-wrap {
      max-width: 520px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ── DASHBOARD CARD ── */
    .lm-card {
      background: rgba(255, 255, 255, 0.88);
      border-radius: 28px;
      padding: 36px 32px 32px;
      /* スクリーンショットの柔らかいシャドウ */
      box-shadow:
        0 2px 6px rgba(120, 70, 40, 0.04),
        0 8px 32px rgba(120, 70, 40, 0.09),
        0 24px 64px rgba(120, 70, 40, 0.06);
      margin-bottom: 52px;
      backdrop-filter: blur(12px);
    }
    .lm-card-label {
      font-size: 11px;
      letter-spacing: 0.14em;
      color: #B8744A;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .lm-card-label::before {
      content: '◆';
      font-size: 7px;
      color: #D4A882;
    }

    /* ── カラーピッカー エリア ── */
    .lm-picker-row {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-bottom: 32px;
    }

    /* 破線リング＋カラーサークル */
    .lm-ring-wrap {
      position: relative;
      flex-shrink: 0;
      /* 外側の破線リング分を含めた全体サイズ */
      width: 100px;
      height: 100px;
      cursor: pointer;
    }
    /* 破線の外リング */
    .lm-ring-dashed {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px dashed #C8A48A;
      /* 破線の内側に白い余白を作る */
      background: transparent;
      pointer-events: none;
    }
    /* 白い余白レイヤー（破線とカラー円の間） */
    .lm-ring-gap {
      position: absolute;
      inset: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.7);
      pointer-events: none;
    }
    /* カラー表示円 */
    #color-preview {
      position: absolute;
      inset: 11px;
      border-radius: 50%;
      background-color: #BE185D;
      box-shadow:
        0 2px 8px rgba(120, 60, 30, 0.20),
        0 6px 20px rgba(120, 60, 30, 0.15);
      transition: background-color 0.25s ease;
    }
    /* 不可視のカラーピッカー input（リング全体をタップ可能に） */
    #color-input {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
      border-radius: 50%;
      z-index: 10;
    }

    /* hex表示 ＋ ヒント */
    .lm-hex-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    #hex-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 34px;
      font-weight: 600;
      color: #3B2010;
      letter-spacing: 0.03em;
      line-height: 1;
    }
    .lm-tap-hint {
      font-size: 11px;
      color: #C0A090;
      letter-spacing: 0.06em;
      font-weight: 300;
    }

    /* ── RGB スライダー ── */
    .lm-sliders { margin-bottom: 32px; }
    .lm-slider-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .lm-slider-row:last-child { margin-bottom: 0; }
    .lm-slider-label {
      font-size: 11px;
      color: #C0A090;
      width: 10px;
      flex-shrink: 0;
      font-weight: 400;
    }
    .lm-range {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 5px;
      border-radius: 3px;
      outline: none;
      cursor: pointer;
      /* 初期値はJSで上書き */
    }
    /* サムネイル（つまみ）*/
    .lm-range::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: white;
      border: 2px solid #C8A48A;
      box-shadow: 0 1px 5px rgba(100, 50, 20, 0.18);
      transition: border-color 0.15s;
    }
    .lm-range::-webkit-slider-thumb:hover {
      border-color: #A06840;
    }
    .lm-range::-moz-range-thumb {
      width: 16px; height: 16px;
      border-radius: 50%;
      background: white;
      border: 2px solid #C8A48A;
      box-shadow: 0 1px 5px rgba(100, 50, 20, 0.18);
    }
    .lm-slider-val {
      font-size: 11px;
      color: #C0A090;
      width: 28px;
      text-align: right;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    /* ── 検索ボタン ── */
    #search-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(90deg, #8B4F2E 0%, #C08050 50%, #A06438 100%);
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 14px;
      letter-spacing: 0.2em;
      font-family: 'Shippori Mincho', serif;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      box-shadow: 0 4px 20px rgba(120, 60, 20, 0.25);
    }
    #search-btn:hover  { opacity: 0.88; }
    #search-btn:active { transform: scale(0.985); }

    /* ── RESULTS ── */
    #results-container { display: none; }
    #results-container.visible { display: block; }

    .lm-results-heading {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 600;
      text-align: center;
      color: #3B2010;
      letter-spacing: 0.14em;
      margin-bottom: 20px;
    }
    .lm-results-rule {
      display: flex;
      align-items: center;
      margin-bottom: 28px;
    }
    .lm-results-rule::before,
    .lm-results-rule::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #D8C4B4;
    }
    .lm-results-rule span {
      color: #C4A088;
      font-size: 8px;
      padding: 0 12px;
    }

    #results-list { display: flex; flex-direction: column; gap: 16px; }

    .result-card {
      background: rgba(255, 255, 255, 0.9);
      border-radius: 20px;
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 18px;
      box-shadow:
        0 2px 8px rgba(120, 70, 40, 0.06),
        0 8px 24px rgba(120, 70, 40, 0.07);
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.45s ease forwards;
    }
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    .result-swatch-wrap {
      position: relative;
      flex-shrink: 0;
    }
    .result-swatch {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      border: 4px solid white;
      box-shadow:
        0 2px 8px rgba(120, 60, 30, 0.15),
        0 6px 20px rgba(120, 60, 30, 0.12);
    }
    .result-badge {
      position: absolute;
      top: -2px;
      left: -2px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #8B5538;
      color: white;
      font-size: 10px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    }
    .result-info { flex: 1; min-width: 0; }
    .result-brand {
      font-size: 10px;
      letter-spacing: 0.22em;
      color: #B8744A;
      text-transform: uppercase;
      margin-bottom: 5px;
      font-weight: 500;
    }
    .result-name {
      font-family: 'Shippori Mincho', serif;
      font-size: 14px;
      font-weight: 600;
      color: #3B2010;
      line-height: 1.5;
      margin-bottom: 9px;
      word-break: break-all;
      overflow-wrap: break-word;
    }
    .result-hex-chip {
      display: inline-block;
      background: #F0E6DE;
      color: #9B7455;
      font-size: 10px;
      font-family: 'Courier New', monospace;
      padding: 3px 10px;
      border-radius: 99px;
      letter-spacing: 0.05em;
    }
    .result-right {
      flex-shrink: 0;
      text-align: right;
      min-width: 64px;
    }
    .result-pct {
      font-family: 'Cormorant Garamond', serif;
      font-size: 32px;
      font-weight: 600;
      color: #3B2010;
      line-height: 1;
    }
    .result-pct sup {
      font-size: 15px;
      vertical-align: super;
    }
    .result-match-label {
      font-size: 8px;
      letter-spacing: 0.25em;
      color: #C0A090;
      text-transform: uppercase;
      margin-top: 3px;
    }
    .result-bar {
      width: 56px;
      height: 3px;
      background: #EAD8CC;
      border-radius: 2px;
      margin-top: 10px;
      margin-left: auto;
      overflow: hidden;
    }
    .result-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #8B4F2E, #C08050);
      border-radius: 2px;
    }
    .result-shops {
      display: flex;
      gap: 6px;
      margin-top: 9px;
    }
    .shop-btn {
      font-size: 9px;
      letter-spacing: 0.04em;
      font-weight: 700;
      padding: 4px 11px;
      border-radius: 99px;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .shop-btn:hover { opacity: 0.78; }
    .shop-btn-qoo { background: #FBF0E8; color: #9B5C3A; border: 1px solid #E8C4AC; }
    .shop-btn-amz { background: #FEF8EC; color: #A07820; border: 1px solid #ECD898; }

    /* ── footer ── */
    .lm-footer {
      text-align: center;
      padding: 44px 0 20px;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 12px;
      color: #C4A088;
      letter-spacing: 0.12em;
    }
  </style>
</head>
<body>

  <!-- ── HEADER ── -->
  <header class="lm-header">
    <p class="lm-eyebrow">Colour Matching</p>
    <h1 class="lm-logo">Lip<em>Match</em></h1>
    <p class="lm-subtitle">理想の色を、あなたの唇へ。</p>
    <div class="lm-divider"></div>
  </header>

  <div class="lm-wrap">

    <!-- ── DASHBOARD CARD ── -->
    <div class="lm-card">
      <div class="lm-card-label">あなたの理想のリップカラー</div>

      <!-- Color ring + hex display -->
      <div class="lm-picker-row">
        <div class="lm-ring-wrap">
          <!-- 破線の外リング -->
          <div class="lm-ring-dashed"></div>
          <!-- 破線とカラー円の間の白い余白 -->
          <div class="lm-ring-gap"></div>
          <!-- カラー表示円 -->
          <div id="color-preview"></div>
          <!-- 透明なカラーピッカー（全体タップ可能） -->
          <input type="color" id="color-input" value="#BE185D" />
        </div>
        <div class="lm-hex-info">
          <span id="hex-label">#BE185D</span>
          <span class="lm-tap-hint">丸をタップして色を選択</span>
        </div>
      </div>

      <!-- RGB sliders (display only, synced to color-input) -->
      <div class="lm-sliders">
        <div class="lm-slider-row">
          <span class="lm-slider-label">R</span>
          <input class="lm-range lm-range-r" type="range" id="slider-r" min="0" max="255" value="190" />
          <span class="lm-slider-val" id="val-r">190</span>
        </div>
        <div class="lm-slider-row">
          <span class="lm-slider-label">G</span>
          <input class="lm-range lm-range-g" type="range" id="slider-g" min="0" max="255" value="24" />
          <span class="lm-slider-val" id="val-g">24</span>
        </div>
        <div class="lm-slider-row">
          <span class="lm-slider-label">B</span>
          <input class="lm-range lm-range-b" type="range" id="slider-b" min="0" max="255" value="93" />
          <span class="lm-slider-val" id="val-b">93</span>
        </div>
      </div>

      <!-- Search button (same id as original) -->
      <button id="search-btn">似ているリップを探す &nbsp;→</button>
    </div>

    <!-- ── RESULTS ── -->
    <section id="results-container">
      <h2 class="lm-results-heading">あなたへのおすすめ</h2>
      <div class="lm-results-rule"><span>◆</span></div>
      <div id="results-list"></div>
    </section>

  </div>

  <footer class="lm-footer">© 2025 LipMatch</footer>

  <script>
    // DOM references
    const colorInput       = document.getElementById('color-input');
    const colorPreview     = document.getElementById('color-preview');
    const hexLabel         = document.getElementById('hex-label');
    const sliderR          = document.getElementById('slider-r');
    const sliderG          = document.getElementById('slider-g');
    const sliderB          = document.getElementById('slider-b');
    const valR             = document.getElementById('val-r');
    const valG             = document.getElementById('val-g');
    const valB             = document.getElementById('val-b');
    const searchBtn        = document.getElementById('search-btn');
    const resultsContainer = document.getElementById('results-container');
    const resultsList      = document.getElementById('results-list');

    function hexToRgb(hex) {
      const clean = hex.replace('#', '');
      return {
        r: parseInt(clean.substring(0, 2), 16),
        g: parseInt(clean.substring(2, 4), 16),
        b: parseInt(clean.substring(4, 6), 16)
      };
    }

    function updateSliderStyle(slider, channel) {
      const val = parseInt(slider.value);
      const pct = (val / 255) * 100;
      const c = {
        r: { fill: '#C07070', empty: '#F0D8D8' },
        g: { fill: '#70A870', empty: '#D8EDD8' },
        b: { fill: '#7090C8', empty: '#D8E0F0' }
      }[channel];
      slider.style.background =
        `linear-gradient(to right, ${c.fill} 0%, ${c.fill} ${pct}%, ${c.empty} ${pct}%, ${c.empty} 100%)`;
    }

    function syncSlidersFromHex(hex) {
      const { r, g, b } = hexToRgb(hex);
      sliderR.value = r; valR.textContent = r; updateSliderStyle(sliderR, 'r');
      sliderG.value = g; valG.textContent = g; updateSliderStyle(sliderG, 'g');
      sliderB.value = b; valB.textContent = b; updateSliderStyle(sliderB, 'b');
    }

    function rgbToHex(r, g, b) {
      return '#' + [r, g, b].map(v => Number(v).toString(16).padStart(2, '0')).join('').toUpperCase();
    }

    function applyColor(hex) {
      colorPreview.style.backgroundColor = hex;
      hexLabel.textContent = hex.toUpperCase();
    }

    colorInput.addEventListener('input', (e) => {
      const color = e.target.value.toUpperCase();
      applyColor(color);
      syncSlidersFromHex(color);
    });

    function onSliderChange() {
      const hex = rgbToHex(sliderR.value, sliderG.value, sliderB.value);
      colorInput.value = hex;
      applyColor(hex);
      valR.textContent = sliderR.value; updateSliderStyle(sliderR, 'r');
      valG.textContent = sliderG.value; updateSliderStyle(sliderG, 'g');
      valB.textContent = sliderB.value; updateSliderStyle(sliderB, 'b');
    }
    sliderR.addEventListener('input', onSliderChange);
    sliderG.addEventListener('input', onSliderChange);
    sliderB.addEventListener('input', onSliderChange);

    // Color matching function
    function calculateMatch(hex1, hex2) {
      const rgb1 = hexToRgb(hex1);
      const rgb2 = hexToRgb(hex2);
      const dist = Math.sqrt(
        Math.pow(rgb1.r - rgb2.r, 2) +
        Math.pow(rgb1.g - rgb2.g, 2) +
        Math.pow(rgb1.b - rgb2.b, 2)
      );
      return Math.round(Math.max(0, 100 - (dist / 4.4)));
    }

    // Init
    syncSlidersFromHex(colorInput.value);
    applyColor(colorInput.value);


    // Qoo10 affiliate link mapping
    function getQoo10Link(brand, name) {
      const map = [
        { brand: 'milktouch', kw: 'ジェリーフィット',          url: 'https://m.qoo10.jp/su/1459144126/Q177209338' },
        { brand: 'milktouch', kw: '花雨グロス',                url: 'https://m.qoo10.jp/su/1459144061/Q177209338' },
        { brand: 'rom&nd',    kw: 'グラスティングカラーグロス', url: 'https://m.qoo10.jp/su/1459144154/Q177209338' },
        { brand: 'rom&nd',    kw: 'グラスティングメルティングバーム', url: 'https://m.qoo10.jp/su/1459144173/Q177209338' },
        { brand: 'rom&nd',    kw: 'ジューシーラスティングティント', url: 'https://m.qoo10.jp/su/1459144198/Q177209338' },
        { brand: 'CLIO',      kw: 'クリスタルグラムティント',   url: 'https://m.qoo10.jp/su/1459144225/Q177209338' },
        { brand: 'CLIO',      kw: 'グレーズ',                  url: 'https://m.qoo10.jp/su/1459144240/Q177209338' },

        { brand: 'LAKA',      kw: 'フルーティ',                url: 'https://m.qoo10.jp/su/1459144312/Q177209338' },
        { brand: 'LAKA',      kw: 'マキシ',                    url: 'https://m.qoo10.jp/su/1459144323/Q177209338' },
        { brand: 'LAKA',      kw: 'ボンディング',              url: 'https://m.qoo10.jp/su/1459144336/Q177209338' },
        { brand: 'LAKA',      kw: 'ポッピング',                url: 'https://m.qoo10.jp/su/1459144356/Q177209338' },
        { brand: 'TIRTIR',    kw: 'ウォーター',                url: 'https://m.qoo10.jp/su/1459144385/Q177209338' },
        { brand: 'peripera',  kw: 'インク',                    url: 'https://m.qoo10.jp/su/1459144418/Q177209338' },
        { brand: 'dasique',  kw: 'グロウ',                    url: 'https://m.qoo10.jp/su/1459144495/Q177209338' },
        { brand: 'dasique',  kw: 'デュイティント',            url: 'https://m.qoo10.jp/su/1459144488/Q177209338' },
        { brand: 'BBIA',      kw: 'ローティント',              url: 'https://m.qoo10.jp/su/1459144532/Q177209338' },
        { brand: 'BBIA',      kw: 'グローリップ',              url: 'https://m.qoo10.jp/su/1459144548/Q177209338' },
        { brand: 'fwee',      kw: '3Dボリューミングティント',  url: 'https://m.qoo10.jp/su/1459144625/Q177209338' },
        { brand: 'fwee',      kw: 'Gloss',                     url: 'https://m.qoo10.jp/su/1459144646/Q177209338' },
        { brand: 'fwee',      kw: 'Pudding',                   url: 'https://m.qoo10.jp/su/1459144646/Q177209338' },
      ];
      for (const e of map) {
        if (e.brand === brand && name.includes(e.kw)) return e.url;
      }
      return null;
    }

    // Amazon affiliate search link (luxury brands excluded)
    const AMAZON_EXCLUDED = ['DIOR', 'CHANEL', 'YSL', 'MAC', 'ADDICTION'];
    function getAmazonLink(brand, name) {
      if (AMAZON_EXCLUDED.includes(brand)) return null;
      const q = encodeURIComponent(brand + ' ' + name.replace(/\s*\d+\S*$/, '').trim());
      return 'https://www.amazon.co.jp/s?k=' + q + '&tag=oiwaraeru22-22';
    }

    searchBtn.addEventListener('click', () => {
      const selectedColor = colorInput.value;
      const matches = LIPSTICK_DB.map(item => ({
        ...item,
        matchPercent: calculateMatch(selectedColor, item.color)
      }));
      const sorted = matches.sort((a, b) => b.matchPercent - a.matchPercent);

      // ブランド分散: まず各ブランドから1件ずつ選ぶ
      const seenBrands = {};
      const diverse = [];
      for (const item of sorted) {
        if (!seenBrands[item.brand]) {
          seenBrands[item.brand] = true;
          diverse.push(item);
          if (diverse.length >= 6) break;
        }
      }
      // 6件未満なら残りで補完（ブランド重複OK）
      if (diverse.length < 6) {
        const pickedIds = new Set(diverse.map(d => d.id));
        for (const item of sorted) {
          if (!pickedIds.has(item.id)) {
            diverse.push(item);
            if (diverse.length >= 6) break;
          }
        }
      }

      renderResults(diverse);
    });

    function renderResults(items) {
      resultsList.innerHTML = '';
      resultsContainer.classList.add('visible');

      items.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'result-card';
        card.style.animationDelay = `${index * 0.12}s`;
        card.innerHTML = `
          <div class="result-swatch-wrap">
            <div class="result-swatch" style="background:${item.color}"></div>
            <div class="result-badge">${index + 1}</div>
          </div>
          <div class="result-info">
            <p class="result-brand">${item.brand}</p>
            <h3 class="result-name">${item.name}</h3>
            <span class="result-hex-chip">${item.color}</span>
            <div class="result-shops">
              ${getQoo10Link(item.brand, item.name) ? `<a href="${getQoo10Link(item.brand, item.name)}" class="shop-btn shop-btn-qoo" target="_blank" rel="noopener">Qoo10</a>` : ''}
              ${getAmazonLink(item.brand, item.name) ? `<a href="${getAmazonLink(item.brand, item.name)}" class="shop-btn shop-btn-amz" target="_blank" rel="noopener">Amazon</a>` : ''}
            </div>
          </div>
          <div class="result-right">
            <div class="result-pct">${item.matchPercent}<sup>%</sup></div>
            <div class="result-match-label">MATCH</div>
            <div class="result-bar"><div class="result-bar-fill" style="width:${item.matchPercent}%"></div></div>
          </div>
        `;
        resultsList.appendChild(card);
      });

      resultsContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
